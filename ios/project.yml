name: zirizima
options:
  bundleIdPrefix: app.zirizima
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Release
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "15.0"

settings:
  base:
    DEVELOPMENT_LANGUAGE: en
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  zirizima:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: zirizima
        excludes:
          - "Assets.xcassets"
    resources:
      - path: zirizima/Assets.xcassets
      - path: zirizima/Resources
    info:
      path: zirizima/Info.plist
      properties:
        CFBundleDisplayName: zirizima
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: false
        NSLocationWhenInUseUsageDescription: "We use your location only to show free public toilets near you. Never stored, never shared."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        CFBundleLocalizations:
          - en
          - ko
          - zh-Hans
          - ja
        CFBundleDevelopmentRegion: en
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.zirizima
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        DEVELOPMENT_TEAM: ""  # set this in Xcode after signing in
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
